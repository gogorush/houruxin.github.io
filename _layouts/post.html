---
layout: default
type: article
---

{%- include i18n.html -%}

<article class="post fade-in">
  <header class="mb-12">
    <div class="flex items-center gap-3 mb-6">
      <span class="badge badge-success">{{ t.post.published }}</span>
      {% include post-meta.html %}
    </div>
    <h1 class="text-3xl md:text-4xl font-bold mb-4 text-balance font-mono">
      <span class="text-gray-500 mr-2">//</span>{{ page.title }}
    </h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="mt-16 pt-8 border-t border-gray-700">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <a href="{{ '/' | relative_url }}" class="btn btn-secondary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        <span>{{ t.post.back_to_posts }}</span>
      </a>

      <div class="flex items-center gap-2 text-sm font-mono text-gray-500">
        <span>{{ t.post.share }}</span>
        <a href="#" class="tag" onclick="navigator.clipboard.writeText(window.location.href); return false;">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span>{{ t.post.copy_link }}</span>
        </a>
      </div>
    </div>
  </footer>
</article>
