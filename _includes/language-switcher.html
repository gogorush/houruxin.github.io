{%- comment -%}
  Language Switcher Component
  Displays current language and allows switching between EN/中文
{%- endcomment -%}

<div class="lang-switcher">
  <button class="lang-btn" id="lang-toggle" aria-label="Switch language">
    <span class="lang-current" id="lang-current-display">{{ page.lang | default: 'en' | upcase }}</span>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>
  <div class="lang-dropdown hidden" id="lang-dropdown">
    <button class="lang-option" data-lang="en">English</button>
    <button class="lang-option" data-lang="zh">中文</button>
  </div>
</div>

<style>
  .lang-switcher {
    position: relative;
  }

  .lang-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.375rem 0.75rem;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 600;
    background: var(--color-bg-tertiary);
    border: 1px solid var(--color-border-secondary);
    border-radius: var(--radius-md);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .lang-btn:hover {
    border-color: var(--color-accent);
    color: var(--color-accent);
  }

  .lang-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 0.25rem;
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border-primary);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    z-index: 1000;
    min-width: 100px;
    overflow: hidden;
  }

  .lang-dropdown.hidden {
    display: none;
  }

  .lang-option {
    display: block;
    width: 100%;
    padding: 0.5rem 0.75rem;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .lang-option:hover {
    background: var(--color-bg-tertiary);
    color: var(--color-text-primary);
  }

  .lang-option.active {
    background: var(--color-bg-tertiary);
    color: var(--color-accent);
  }
</style>

<script>
  (function() {
    // Wait for DOM to be ready
    function initLangSwitcher() {
      var toggle = document.getElementById('lang-toggle');
      var dropdown = document.getElementById('lang-dropdown');
      var currentDisplay = document.getElementById('lang-current-display');
      var options = dropdown ? dropdown.querySelectorAll('.lang-option') : [];

      if (!toggle || !dropdown) return;

      // Determine current language from page lang or URL
      var currentLang = getCurrentLang();

      if (currentDisplay) {
        currentDisplay.textContent = currentLang.toUpperCase();
      }

      for (var i = 0; i < options.length; i++) {
        var opt = options[i];
        if (opt.dataset.lang === currentLang) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      }

      // Toggle dropdown on click
      toggle.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', function() {
        dropdown.classList.add('hidden');
      });

      // Handle language selection
      for (var i = 0; i < options.length; i++) {
        (function(option) {
          option.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            var lang = option.dataset.lang;
            switchLanguage(lang);
          });
        })(options[i]);
      }
    }

    function getCurrentLang() {
      // Check page lang attribute first
      var htmlLang = document.documentElement.lang || 'en';
      if (htmlLang !== 'en' && htmlLang !== 'zh') {
        htmlLang = 'en';
      }

      // Check if we're on Chinese homepage
      var path = window.location.pathname;
      if (path.indexOf('/index.zh.html') !== -1 || path.indexOf('index.zh') !== -1) {
        return 'zh';
      }

      // Check if we're on a Chinese post
      if (path.indexOf('.zh/') !== -1 || path.indexOf('.zh.html') !== -1) {
        return 'zh';
      }

      return htmlLang;
    }

    function switchLanguage(lang) {
      // Store preference
      localStorage.setItem('preferred_lang', lang);

      // Get current language
      var currentLang = getCurrentLang();

      // Already on target language
      if (lang === currentLang) {
        var dropdown = document.getElementById('lang-dropdown');
        if (dropdown) dropdown.classList.add('hidden');
        return;
      }

      var currentPath = window.location.pathname;
      var newPath = currentPath;

      // Handle homepage: / or /index.html <-> /index.zh.html
      if (currentPath === '/' || currentPath.indexOf('/index.html') !== -1 || currentPath.indexOf('/index.en.html') !== -1) {
        if (lang === 'zh') {
          newPath = '/index.zh.html';
        }
      } else if (currentPath.indexOf('/index.zh.html') !== -1) {
        if (lang === 'en') {
          newPath = '/';
        }
      }
      // Handle post URLs: /posts/welcome.en/ -> /posts/welcome.zh/
      else if (currentPath.indexOf('/posts/') !== -1) {
        if (currentLang === 'en') {
          newPath = currentPath.replace('.en/', '.zh/');
        } else {
          newPath = currentPath.replace('.zh/', '.en/');
        }
      }

      // Navigate to new page
      if (newPath !== currentPath) {
        window.location.href = newPath;
      }
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initLangSwitcher);
    } else {
      initLangSwitcher();
    }
  })();
</script>
