<header class="header">
  <div class="container">
    <div class="flex items-center justify-between py-4">
      <a href="{{ '/' | relative_url }}" class="header-logo group flex items-center gap-2">
        <span class="text-2xl">✦</span>
        <span>{{ site.title }}</span>
      </a>

      <nav class="header-nav hidden md:flex">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about' | relative_url }}">About</a>
      </nav>

      <!-- Mobile menu button -->
      <button
        class="md:hidden p-2 text-gray-600 hover:text-gray-900"
        aria-label="Toggle menu"
        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden pb-4">
      <nav class="flex flex-col gap-2">
        <a href="{{ '/' | relative_url }}" class="px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">Home</a>
        <a href="{{ '/about' | relative_url }}" class="px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">About</a>
      </nav>
    </div>
  </div>
</header>
